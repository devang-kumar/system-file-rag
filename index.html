<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Finder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    aside {
      width: 260px;
      background: #16161e;
      border-right: 1px solid #2a2a3a;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 16px;
      flex-shrink: 0;
    }

    aside h2 {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.5px;
    }

    aside p.subtitle {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .index-btn {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .index-btn:hover { background: #6d28d9; }
    .index-btn:disabled { background: #3a3a4a; cursor: not-allowed; color: #888; }

    .status-badge {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #1e1e2e;
      color: #888;
      border: 1px solid #2a2a3a;
    }

    .status-badge.ready { color: #4ade80; border-color: #166534; background: #052e16; }
    .status-badge.running { color: #facc15; border-color: #713f12; background: #1c1007; }

    .log-box {
      flex: 1;
      overflow-y: auto;
      background: #0d0d14;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: #555;
      line-height: 1.6;
      font-family: monospace;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px solid #2a2a3a;
      background: #16161e;
    }

    header h1 { font-size: 20px; font-weight: 700; color: #e0e0e0; }
    header p { font-size: 13px; color: #555; margin-top: 2px; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .avatar { background: #7c3aed; }
    .message.bot .avatar { background: #1e1e2e; border: 1px solid #2a2a3a; }

    .bubble {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 680px;
    }

    .message.user .bubble {
      background: #3b1f6e;
      border-color: #5b21b6;
    }

    .files-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-card {
      background: #0f0f18;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
    }

    .file-card .file-name {
      font-weight: 600;
      color: #a78bfa;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .file-card .file-path {
      color: #555;
      word-break: break-all;
      font-family: monospace;
      font-size: 11px;
    }

    .file-card .file-meta {
      color: #666;
      margin-top: 4px;
      display: flex;
      gap: 12px;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }

    .typing span {
      width: 7px; height: 7px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #2a2a3a;
      background: #16161e;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #0f0f18;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #7c3aed; }

    textarea::placeholder { color: #444; }

    .send-btn {
      background: #7c3aed;
      border: none;
      color: white;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #6d28d9; }
    .send-btn:disabled { background: #2a2a3a; cursor: not-allowed; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #333;
    }

    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
  </style>
</head>
<body>

<aside>
  <h2>🔍 File Finder</h2>
  <p class="subtitle">Describe any file in plain English and the system will find it across your entire machine.</p>

  <button class="index-btn" id="indexBtn" onclick="startIndex()">Build Index</button>
  <div class="status-badge" id="statusBadge">Not indexed</div>

  <div class="log-box" id="logBox">Logs will appear here...</div>
</aside>

<main>
  <header>
    <h1>Chat with your file system</h1>
    <p>Try: "a python script I wrote for scraping" or "my resume PDF"</p>
  </header>

  <div id="chat-window">
    <div class="empty-state" id="emptyState">
      <div class="icon">🗂️</div>
      <p>Ask about any file on your system</p>
    </div>
  </div>

  <div class="input-area">
    <textarea id="inputBox" rows="1" placeholder="Describe the file you're looking for..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</main>

<script>
  let polling = null;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function appendMessage(role, text, files) {
    const win = document.getElementById('chat-window');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    if (files && files.length > 0) {
      const list = document.createElement('div');
      list.className = 'files-list';
      files.forEach(f => {
        const card = document.createElement('div');
        card.className = 'file-card';
        const icon = f.type === 'folder' ? '📁' : getIcon(f.ext);
        card.innerHTML = `
          <div class="file-name">${icon} ${f.name}${f.ext || ''}</div>
          <div class="file-path">${f.path}</div>
          <div class="file-meta">
            <span>📅 ${f.modified || 'unknown'}</span>
            <span>💾 ${f.size_kb || 0} KB</span>
            <span>🏷️ ${f.type}</span>
          </div>
        `;
        list.appendChild(card);
      });
      bubble.appendChild(list);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    win.appendChild(msg);
    win.scrollTop = win.scrollHeight;
    return msg;
  }

  function appendTyping() {
    const win = document.getElementById('chat-window');
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = 'typing-indicator';
    msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    `;
    win.appendChild(msg);
    win.scrollTop = win.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('inputBox');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', text);
    appendTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      appendMessage('bot', data.reply, data.files);
    } catch (e) {
      removeTyping();
      appendMessage('bot', 'Something went wrong. Make sure the server is running.');
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('inputBox').focus();
  }

  async function startIndex() {
    const btn = document.getElementById('indexBtn');
    btn.disabled = true;
    btn.textContent = 'Indexing...';
    setStatus('running', 'Indexing in progress...');

    await fetch('/index', { method: 'POST' });

    polling = setInterval(pollStatus, 2000);
  }

  async function pollStatus() {
    const res = await fetch('/status');
    const data = await res.json();

    const logBox = document.getElementById('logBox');
    logBox.textContent = data.log.join('\n');
    logBox.scrollTop = logBox.scrollHeight;

    if (data.done && !data.running) {
      clearInterval(polling);
      setStatus('ready', '✅ Index ready');
      document.getElementById('indexBtn').disabled = false;
      document.getElementById('indexBtn').textContent = 'Rebuild Index';
    } else if (data.running) {
      setStatus('running', '⏳ Indexing...');
    }
  }

  function setStatus(type, text) {
    const badge = document.getElementById('statusBadge');
    badge.textContent = text;
    badge.className = 'status-badge ' + type;
  }

  function getIcon(ext) {
    const map = {
      '.pdf': '📄', '.docx': '📝', '.doc': '📝',
      '.xlsx': '📊', '.xls': '📊', '.csv': '📊',
      '.py': '🐍', '.js': '🟨', '.ts': '🔷',
      '.html': '🌐', '.css': '🎨', '.json': '🔧',
      '.jpg': '🖼️', '.jpeg': '🖼️', '.png': '🖼️',
      '.mp4': '🎬', '.mp3': '🎵',
      '.zip': '🗜️', '.exe': '⚙️',
      '.txt': '📃', '.md': '📃',
    };
    return map[ext] || '📄';
  }

  async function checkInitialStatus() {
    const res = await fetch('/status');
    const data = await res.json();
    if (data.done) {
      setStatus('ready', '✅ Index ready');
      document.getElementById('indexBtn').textContent = 'Rebuild Index';
    }
  }

  checkInitialStatus();
</script>
</body>
</html>
